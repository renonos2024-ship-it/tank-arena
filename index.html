<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Tank Arena</title>
  <meta name="description" content="スマホでも遊べるブラウザ用タンクバトル。ルームコードで通信対戦できます。">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app">
    <section class="hud">
      <div>
        <p class="eyebrow">Browser Tank Battle</p>
        <h1>Tank Arena</h1>
      </div>
      <div class="status" id="status">Solo ready</div>
    </section>

    <section class="panel">
      <div class="mode-row">
        <button id="soloBtn" class="primary">Solo</button>
        <button id="hostBtn">Host</button>
        <form id="joinForm" class="join">
          <input id="roomInput" autocomplete="off" inputmode="text" placeholder="Room code">
          <button type="submit">Join</button>
        </form>
      </div>
      <div class="room" id="roomBox" hidden>
        <span>Room</span>
        <strong id="roomCode"></strong>
        <button id="copyBtn">Copy</button>
      </div>
    </section>

    <section class="game-wrap">
      <canvas id="game" width="960" height="640" aria-label="Tank Arena game field"></canvas>
      <div class="touch-controls" aria-hidden="true">
        <div class="stick" id="stick"><div id="knob"></div></div>
        <button id="shootBtn" class="shoot">FIRE</button>
      </div>
    </section>

    <section class="help">
      <span>Desktop: WASD / Arrow keys to move, Space to fire.</span>
      <span>Mobile: left stick to move, FIRE to shoot.</span>
      <span>Online: Host creates a room code. Other player joins with that code.</span>
    </section>
  </main>

  <script src="https://unpkg.com/peerjs@1.5.5/dist/peerjs.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
